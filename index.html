<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat-Gpt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="w-full h-screen flex">

        <!-- ============ SIDEBAR ============ -->
        <div class="w-64 h-full bg-[#F7F7F8] flex flex-col justify-between p-3 text-[#0d0d0d]">

            <!-- Top section -->
            <div class="flex flex-col gap-1 overflow-y-auto">

                <!-- Logo row -->
                <div class="flex items-center justify-between px-2 py-2">
                    <i class="fa-brands fa-openai text-2xl"></i>
                    <i class="fa-solid fa-table-columns text-lg text-gray-500 cursor-pointer hover:text-black"></i>
                </div>

                <!-- Menu items -->
                <a href="#" id="newChatBtn" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-gray-200 font-medium">
                    <i class="fa-regular fa-pen-to-square"></i> New chat
                </a>
                <a href="#" id="searchChatsBtn" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-200 transition">
                    <i class="fa-solid fa-magnifying-glass"></i> Search chats
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-200 transition">
                    <i class="fa-solid fa-book-open"></i> Library
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-200 transition">
                    <i class="fa-regular fa-folder"></i> Projects
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-200 transition">
                    <i class="fa-solid fa-table-cells-large"></i> Apps
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-200 transition">
                    <i class="fa-solid fa-code"></i> Codex
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-200 transition">
                    <i class="fa-solid fa-ellipsis"></i> More
                </a>

                <!-- Recents -->
                <p class="text-xs text-gray-500 px-3 mt-4 mb-1">Recents</p>
                <div id="recentsList">
                    <p class="px-3 py-2 text-sm text-gray-400 italic">No chats yet</p>
                </div>
            </div>

            <!-- Bottom: user profile -->
            <div class="flex items-center justify-between px-2 py-2 mt-2">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-green-600 text-white flex items-center justify-center text-sm font-semibold">FA</div>
                    <div class="leading-tight">
                        <p class="text-sm font-medium">FAIZAN KHAN</p>
                        <p class="text-xs text-gray-500">Free</p>
                    </div>
                </div>
                <button class="text-xs border border-gray-300 rounded-full px-3 py-1 hover:bg-gray-200 transition">Upgrade</button>
            </div>
        </div>

        <!-- ============ MAIN AREA ============ -->
        <div class="flex-1 h-full flex flex-col bg-white">

            <!-- Top bar -->
            <div class="flex items-center justify-between px-6 py-4">
                <button class="flex items-center gap-1 font-semibold text-lg hover:bg-gray-100 px-2 py-1 rounded-lg transition">
                    ChatGPT <i class="fa-solid fa-angle-down text-sm text-gray-500"></i>
                </button>
                <div class="flex items-center gap-4">
                    <button class="flex items-center gap-2 text-sm hover:bg-gray-100 px-3 py-1.5 rounded-lg transition">
                        <i class="fa-solid fa-database text-gray-500"></i> Memory full
                    </button>
                    <button class="flex items-center gap-2 text-sm text-indigo-600 font-medium hover:bg-indigo-50 px-3 py-1.5 rounded-lg transition">
                        <i class="fa-solid fa-gem"></i> Upgrade
                    </button>
                    <div class="w-8 h-8 rounded-full border border-dashed border-gray-400"></div>
                </div>
            </div>


            <!-- Center content -->
            <div class="relative flex-1 flex flex-col items-center justify-center px-4">

                <!-- Greeting -->
                <h1 id="greeting" class="text-3xl font-semibold mb-8 text-center">Hey, Faizan Khan. Ready to dive in?</h1>

                <!-- Chat messages area (empty until messages are added by JS) -->
                <div id="chatMessages" class=" w-full max-w-5xl h-[78vh] -mt-12 mb-4 overflow-y-auto hidden flex-col gap-5 py-6 px-6 text-base">
                    <!-- bubbles are created by app.js, one per message -->
                </div>

                <!-- Input box -->
                <div class="w-full max-w-2xl" id="inDiv">
                    <form id="chatForm" class="flex items-center gap-3 border border-gray-200 rounded-full px-4 py-3 shadow-sm bg-white">
                        <button type="button" id="plusBtn" class="text-xl text-gray-600 hover:text-black"><i class="fa-solid fa-plus"></i></button>
                        <input type="text" id="chatInput" placeholder="Ask anything" class="flex-1 outline-none bg-transparent text-base">
                        <button type="button" id="micBtn" class="text-lg text-gray-600 hover:text-black"><i class="fa-solid fa-microphone"></i></button>
                        <button type="submit" id="sendBtn" class="w-9 h-9 rounded-full bg-black text-white flex items-center justify-center hover:bg-gray-800 transition">
                            <i class="fa-solid fa-wave-square"></i>
                        </button>
                    </form>

                    <!-- Suggestion buttons -->
                    <div class="flex items-center justify-center gap-3 mt-5 suggestion_btns">
                        <button id="createImageBtn" class="flex items-center gap-2 text-sm border border-gray-200 rounded-full px-4 py-2 hover:bg-gray-100 transition">
                            <i class="fa-regular fa-image text-gray-600"></i> Create an image
                        </button>
                        <button id="writeEditBtn" class="flex items-center gap-2 text-sm border border-gray-200 rounded-full px-4 py-2 hover:bg-gray-100 transition">
                            <i class="fa-solid fa-pencil text-gray-600"></i> Write or edit
                        </button>
                        <button id="lookUpBtn" class="flex items-center gap-2 text-sm border border-gray-200 rounded-full px-4 py-2 hover:bg-gray-100 transition">
                            <i class="fa-solid fa-globe text-gray-600"></i> Look something up
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="./app.js"></script>
</body>
</html>
